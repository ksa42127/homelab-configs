mqtt:
  enabled: true
  host: 192.168.1.201
  port: 1883
  user: frigate         # The user you created in LXC 201
  password: frigate_pass # The password you set

database:
  path: /config/frigate.db

detectors:
  coral:
    type: edgetpu
    device: pci

ffmpeg:
  hwaccel_args: preset-vaapi

go2rtc:
  streams:
    front_door: rtsp://admin:PronesMXY2764@192.168.1.150:554/h264Preview_01_main
    trackmix_wide: rtsp://admin:PronesMXY2764@192.168.1.152:554/h264Preview_01_main
    trackmix_telephoto: rtsp://admin:PronesMXY2764@192.168.1.152:554/h264Preview_02_main
    reolink_doorbell: rtsp://admin:PronesMXY2764@192.168.1.151:554/h264Preview_01_main

cameras:
  front_door:
    ffmpeg:
      inputs:
        - path: rtsp://admin:PronesMXY2764@192.168.1.150:554/h264Preview_01_sub
          roles: [detect]
        - path: rtsp://admin:PronesMXY2764@192.168.1.150:554/h264Preview_01_main
          roles: [record]
    detect:
      width: 640
      height: 480
      fps: 2
    zones:
      driveway_entry:
        coordinates: 0.0,0.0,1.0,0.0,1.0,0.4,0.0,0.4
        objects: [car]
      pedestrian_area:
        coordinates: 0.0,0.4,1.0,0.4,1.0,1.0,0.0,1.0
        objects: [person, bicycle]
    objects:
      track: [person, car, bicycle, dog, cat]
      filters:
        car:
          mask: 0.008,0.006,0.006,0.228,0.159,0.08,0.185,0.004
    motion:
      mask: 0.009,0,0.006,0.182,0.035,0.205,0.129,0.126,0.162,0.076,0.183,0.008

  trackmix_wide:
    ffmpeg:
      inputs:
        - path: rtsp://admin:PronesMXY2764@192.168.1.152:554/h264Preview_01_sub
          roles: [detect]
        - path: rtsp://admin:PronesMXY2764@192.168.1.152:554/h264Preview_01_main
          roles: [record]
    detect:
      width: 640
      height: 480
    zones:
      driveway_entrance:
        coordinates: 0.107,0.384,0.594,0.201,0.685,0.261,0.134,0.431
        objects: [car, motorcycle]
    objects:
      track: [car, motorcycle]
    motion:
      mask: 0,0.413,0.389,0.22,0.645,0.086,0.637,0.017,0.336,0.01,-0.001,0.169

  trackmix_telephoto:
    ffmpeg:
      inputs:
        - path: rtsp://admin:PronesMXY2764@192.168.1.152:554/h264Preview_02_sub
          roles: [detect]
        - path: rtsp://admin:PronesMXY2764@192.168.1.152:554/h264Preview_02_main
          roles: [record]
    detect:
      width: 640
      height: 480
    zones:
      Driveway:
        coordinates: 0.21,0.374,0,0.502,0,1,0.809,1,0.942,0.766,0.843,0.652,0.671,0.469,0.705,0.331,0.57,0.188
        objects: [person]
    objects:
      track: [person]

  reolink_doorbell:
    ffmpeg:
      inputs:
        - path: rtsp://admin:PronesMXY2764@192.168.1.151:554/h264Preview_01_sub
          roles: [detect]
        - path: rtsp://admin:PronesMXY2764@192.168.1.151:554/h264Preview_01_main
          roles: [record]
    detect:
      width: 640
      height: 480
    zones:
      walk_way:
        coordinates: 0.567,0.983,0.331,0.988,0.239,0.965,0.207,0.818,0.23,0.63,0.294,0.621,0.369,0.608,0.692,0.545,1,1
        objects: [person]
    objects:
      track: [person, car, package]
      filters:
        car:
          mask: 0.009,0.342,0.014,0.985,0.731,0.997,0.638,0.266
        person:
          mask: 0.298,0.26,0.26,0.281,0.257,0.32,0.246,0.421,0.279,0.51,0.325,0.525,0.399,0.502,0.369,0.458,0.367,0.371,0.339,0.254,0.296,0.239

record:
  enabled: true
  retain:
    days: 7
    mode: motion

version: 0.16-0
