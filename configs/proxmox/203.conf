arch: amd64
cores: 2
features: nesting=1,keyctl=1,fuse=1
hostname: homeassistant
memory: 2048
nameserver: 8.8.8.8
net0: name=eth0,bridge=vmbr0,gw=192.168.1.1,hwaddr=BC:24:11:44:A9:8D,ip=192.168.1.203/24,ip6=auto,type=veth
onboot: 1
ostype: debian
rootfs: local-lvm:vm-203-disk-0,size=16G
searchdomain: home.arpa
swap: 512
tags: automation;community-script;smarthome
timezone: America/Anchorage
unprivileged: 1
lxc.cgroup2.devices.allow: c 10:200 rwm
lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file
