arch: amd64
cores: 1
features: nesting=1,keyctl=1
hostname: pihole
memory: 512
nameserver: 192.168.1.1
net0: name=eth0,bridge=vmbr0,gw=192.168.1.1,hwaddr=BC:24:11:7C:93:42,ip=192.168.1.200/24,ip6=auto,type=veth
onboot: 1
ostype: debian
rootfs: local-lvm:vm-200-disk-0,size=2G
searchdomain: pihole.home.arpa
swap: 512
tags: adblock;community-script
timezone: America/Anchorage
unprivileged: 1
