# Coral M.2 Passthrough for Frigate
# Intel GPU Passthrough
arch: amd64
cores: 4
features: nesting=1,keyctl=1,fuse=1
hostname: frigate
memory: 4096
nameserver: 8.8.8.8
net0: name=eth0,bridge=vmbr0,gw=192.168.1.1,hwaddr=BC:24:11:84:C7:9A,ip=192.168.1.204/24,ip6=auto,type=veth
onboot: 1
ostype: debian
rootfs: local-lvm:vm-204-disk-1,size=100G
searchdomain: home.apra
swap: 512
tags: community-script;docker
timezone: America/Anchorage
lxc.cgroup2.devices.allow: c 10:200 rwm
lxc.mount.entry: /dev/net/tun dev/net/tun none bind,create=file
lxc.cgroup2.devices.allow: c 120:0 rwm
lxc.mount.entry: /dev/apex_0 dev/apex_0 none bind,optional,create=file
lxc.cgroup2.devices.allow: c 226:0 rwm
lxc.cgroup2.devices.allow: c 226:128 rwm
lxc.mount.entry: /dev/dri/card0 dev/dri/card0 none bind,optional,create=file
lxc.mount.entry: /dev/dri/renderD128 dev/dri/renderD128 none bind,optional,create=file
